<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Symbols Nerd Font</family>
      <family>JetBrainsMono Nerd Font</family>
      <family>Font Awesome 6 Free</family>
    </prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Symbols Nerd Font</family>
    </prefer>
  </alias>
</fontconfig>

